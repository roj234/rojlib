type: MAP
properties:
  workspaces:
    type: LIST
    description: 工作空间列表，每个工作空间是一个物理目录、一些固定依赖项、预处理器和预定义变量的集合，通过workspace指令修改
    children:
      type: MAP
      properties:
        type:
          type: STRING
          description: 类型，未在代码中使用，目前仅用作标识
          required: false
        id:
          type: STRING
          description: ID，唯一，出现在指令补全和项目依赖中
        path:
          type: STRING
          description: 项目子路径，缺省时等于ID
          required: false
        depend:
          type: LIST
          required: false
          children:
            type: STRING
        mappedDepend:
          type: LIST
          required: false
          children:
            type: STRING
        unmappedDepend:
          type: LIST
          required: false
          children:
            type: STRING
        processors:
          type: LIST
          required: false
          children:
            type: STRING
            description: 预处理器的全限定名，例如com.example.MyProcesor
        mapping:
          type: STRING
          required: false
        variables: &variables
          type: MAP
          description: |-
            自定义变量，可用于自定义配置
            也用来进行模板替换
            包含project_name和project_version两个内置变量
          required: false
          additionalProperties: true
          properties:
            # 系统变量
            fmd:maven:central:
              type: STRING
              description: Maven远程仓库地址，可以使用;连接多个，从第一个不返回404的地址下载
              constraints: |-
                URI.create(value.asString());
                return true;
              required: false
              default: https://repo1.maven.org/maven2/
            fmd:maven:cache:
              type: STRING
              description: Maven本地缓存目录 (相对于构建缓存目录) 你可以手动改到用户目录
              required: false
              default: .m2
            fmd:at:
              type: STRING
              description: AccessTransformer.cfg的默认位置 通常不需要改动
              required: false
              default: META-INF/accesstransformer.cfg
            fmd:exportBundle:
              type: BOOL
              description: 该项目作为EXPORT类型的依赖被递归BUNDLE时，是否应该包含
              required: false
              default: true
            fmd:annotation_cache:
              type: BOOL
              description: 在构建产物中生成注解缓存
              required: false
              default: true
            fmd:compiler:
              type: STRING
              description: 编译器ID 在config.yml中定义
              required: false
              default: Javac
            fmd:auto_module:name:
              type: STRING
              description: 自动生成模块 名称
              required: false
              default: ${project_name}
            fmd:auto_module:import:
              type: STRING
              description: 自动生成模块 导入列表
              required: false
            #  children:
            #    type: STRING
            fmd:auto_module:main:
              type: STRING
              description: 自动生成模块 主类
              required: false
            fmd:name_format:
              type: STRING
              description: 构建产物的名称格式
              required: false
              default: ${project_name}-${project_version}.jar
            fmd:signature:keystore:
              type: STRING
              description: JAR签名 密钥库路径
              required: false
            fmd:signature:keystore_pass:
              type: STRING
              description: JAR签名 密钥库密码
              required: false
            fmd:signature:key_alias:
              type: STRING
              description: JAR签名 密钥库别名
              required: false
            fmd:signagure:certificate_name:
              type: STRING
              description: JAR签名 证书文件在JAR中的名称
              required: false
            fmd:signagure:manifest_hash_algorithm:
              type: STRING
              description: JAR签名 Manifest 签名哈希算法
              default: SHA-256
            fmd:signagure:signature_hash_algorithm:
              description: JAR签名 PKCS#8 Envelope 签名哈希算法
              type: STRING
              required: false
              default: SHA-256
            javac:use_module:
              type: BOOL
              description: Javac 使用模块系统
              required: false
              default: false
        variable_replace_in: &vr
          type: LIST
          description: 需要进行变量替换的文件路径模式集合
          required: false
          children:
            type: STRING
  projects:
    type: LIST
    children:
      type: MAP
      properties:
        name:
          type: STRING
          description: 项目名称
        type:
          type: STRING
          description: 项目类型：PROJECT(可独立构建), MODULE(子模块), ARTIFACT(仅组合产物)
          default: PROJECT
          pattern: PROJECT|MODULE|ARTIFACT
        version:
          type: STRING
          description: 项目版本
          default: 1.0.0
          # semver
          pattern: ^(\d+)(?:\.(\d+))?(?:\.(\d+))?(?:-([a-zA-Z\d.-]+?))?(\+.+?)?$
        charset:
          type: STRING
          description: 源代码的字符集 (已弃用)
          default: UTF-8
        compiler_options:
          type: LIST
          description: 编译器参数 (已弃用)
          required: false
          children:
            type: STRING
        workspace:
          type: STRING
          description: 工作空间名称
        dependency:
          type: MAP
          description: 项目依赖，键为依赖标识符，值为作用域
          required: false
          children:
            type: STRING
            pattern: COMPILE|EXPORT|BUNDLED
        variables: *variables
        variable_replace_in: *vr
        bundle_ignore:
          type: LIST
          description: 打包时需要忽略的文件路径模式集合
          required: false
          children:
            type: STRING
  default_project:
    type: STRING
    description: 默认项目名称，当未指定项目名称时使用，通过project setdefault修改
    required: false
  auto_compile:
    type: LIST
    description: 自动编译的项目，通过project auto修改
    required: false
    children:
      type: STRING