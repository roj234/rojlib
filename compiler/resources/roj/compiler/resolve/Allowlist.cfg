# Lava Restricted-Import Allowlist Configuration (example)

# - **Key Principles**:
# All classes, members, or packages should be explicitly allowed.
# This (example) configuration balances security with usability in sandboxed Java execution.
#  - Exceptions and core Java lang types are broadly allowed to support basic error handling and primitives.
#  - Selective access to `java/lang/System` and I/O methods is granted for essential operations (e.g., timing, printing), while sensitive ones are disabled.
#  - Standard libraries like `java/util`, `java/time`, and crypto packages are included for common functionality, but with restrictions to prevent abuse.

# Modify entries carefully to avoid exposing unintended capabilities.
