workspaces:
 -
  type: Empty
  id: RojLib
  processors:
   - roj.ci.plugin.ANNOTATION
   - roj.ci.plugin.AnnotationCache
   - roj.ci.plugin.HOT_RELOAD
   - roj.ci.plugin.AdvanceCompress
  variables:
   library_version: "[2, )"
   fmd:compiler: Javac
  variable_replace_in:
   - META-INF/MANIFEST.MF
   - plugin.yml
projects:
 -
  name: annotation
  version: 3.0.0
  workspace: RojLib
  variables:
   fmd:exportBundle: "false"
 -
  name: app
  type: MODULE
  version: 2.0.0
  workspace: RojLib
  dependency:
   gui: COMPILE
   compiler: COMPILE
   ext/tls: COMPILE
   ext/audio: COMPILE
   ext/7z-archive: COMPILE
   plugin: COMPILE
   ext/ebook: COMPILE
   toolchain: COMPILE
   ext/renderer: COMPILE
   ext/p2p: COMPILE
   ext/bt-client: COMPILE
 -
  name: compiler
  type: MODULE
  version: 1.1.4-alpha
  workspace: RojLib
  dependency:
   core: COMPILE
 -
  name: core
  type: MODULE
  version: 2.0.0
  workspace: RojLib
  dependency:
   annotation: EXPORT
  variables:
   jni_version: "20250909"
 -
  name: datagen
  version: 1.1.0
  compiler_options:
   - "--add-modules"
   - jdk.internal.vm.ci
   - "--add-exports"
   - jdk.internal.vm.ci/jdk.vm.ci.code=ALL-UNNAMED
   - "--add-exports"
   - jdk.internal.vm.ci/jdk.vm.ci.code.site=ALL-UNNAMED
   - "--add-exports"
   - jdk.internal.vm.ci/jdk.vm.ci.hotspot=ALL-UNNAMED
   - "--add-exports"
   - jdk.internal.vm.ci/jdk.vm.ci.meta=ALL-UNNAMED
   - "--add-exports"
   - jdk.internal.vm.ci/jdk.vm.ci.runtime=ALL-UNNAMED
  workspace: RojLib
  dependency:
   core: COMPILE
 -
  name: ext/7z-archive
  type: MODULE
  workspace: RojLib
  dependency:
   core: COMPILE
 -
  name: ext/7z-vfs
  type: MODULE
  workspace: RojLib
  dependency:
   ext/7z-archive: EXPORT
   http-server: COMPILE
   core: COMPILE
 -
  name: ext/audio
  type: MODULE
  version: 2.0.0
  workspace: RojLib
  dependency:
   core: COMPILE
 -
  name: ext/bt-client
  type: MODULE
  workspace: RojLib
  dependency:
   http: COMPILE
   core: COMPILE
 -
  name: ext/ebook
  type: MODULE
  version: 2.0.0
  workspace: RojLib
  dependency:
   gui: COMPILE
   http-server: COMPILE
   core: COMPILE
 -
  name: ext/eventbus
  type: MODULE
  version: 1.3.0
  workspace: RojLib
  dependency:
   core: COMPILE
 -
  name: ext/filesystem
  type: MODULE
  version: 0.0.0
  workspace: RojLib
  dependency:
   core: COMPILE
 -
  name: ext/image
  type: MODULE
  version: 2.0.0
  workspace: RojLib
  dependency:
   core: COMPILE
 -
  name: ext/machine-learning
  type: MODULE
  workspace: RojLib
  dependency:
   http: COMPILE
   core: COMPILE
 -
  name: ext/p2p
  type: MODULE
  version: 2.0.0
  workspace: RojLib
  dependency:
   http: COMPILE
   core: COMPILE
 -
  name: ext/pinyin
  type: MODULE
  version: 1.2.0
  workspace: RojLib
  dependency:
   core: COMPILE
 -
  name: ext/renderer
  workspace: RojLib
  dependency:
   maven:///net.java.dev.jna:jna:5.12.1: COMPILE
   core: COMPILE
 -
  name: ext/sql
  type: MODULE
  version: 2.0.0
  workspace: RojLib
  dependency:
   core: COMPILE
 -
  name: ext/tls
  type: MODULE
  version: 3.0.0
  workspace: RojLib
  dependency:
   network: EXPORT
   core: COMPILE
 -
  name: gui
  type: MODULE
  version: 2.0.0
  workspace: RojLib
  dependency:
   core: COMPILE
 -
  name: http
  type: MODULE
  version: 2.0.0
  workspace: RojLib
  dependency:
   network: EXPORT
   core: COMPILE
 -
  name: http-server
  type: MODULE
  version: 2.2.0
  workspace: RojLib
  dependency:
   http: EXPORT
   core: COMPILE
 -
  name: jocker
  type: ARTIFACT
  version: 1.13.0
  workspace: RojLib
  dependency:
   ext/7z-vfs: BUNDLED
   compiler: BUNDLED
   ext/tls: BUNDLED
   ext/7z-archive: BUNDLED
   ext/sql: BUNDLED
   plugin: BUNDLED
   ext/ebook: BUNDLED
   app: BUNDLED
   core: BUNDLED
  bundle_ignore:
   - META-INF/MANIFEST.MF
   - META-INF/MANIFEST.MF:core
 -
  name: network
  type: MODULE
  version: 2.1.0
  workspace: RojLib
  dependency:
   core: COMPILE
 -
  name: plugin
  type: MODULE
  version: 1.12.0
  workspace: RojLib
  dependency:
   ext/eventbus: EXPORT
   http-server: EXPORT
   core: EXPORT
 -
  name: plugin/remote-vfs
  workspace: RojLib
  dependency:
   plugin: COMPILE
   ext/tls: COMPILE
  variables:
   project_name: RemoteFileSystem
 -
  name: plugin/sso
  version: 2.1.0
  workspace: RojLib
  dependency:
   ext/sql: COMPILE
   plugin: COMPILE
  variables:
   project_name: EasySSO
 -
  name: test
  workspace: RojLib
  dependency:
   ext/ebook: COMPILE
   ext/tls: COMPILE
   ext/audio: COMPILE
   http-server: COMPILE
   core: COMPILE
 -
  name: toolchain
  version: 3.8.2
  workspace: RojLib
  dependency:
   gui: BUNDLED
   compiler: BUNDLED
   ext/eventbus: BUNDLED
   ext/7z-archive: BUNDLED
   network: BUNDLED
   http: BUNDLED
   core: BUNDLED
default_project: ~
auto_compile:
 - jocker
 - toolchain
 - test