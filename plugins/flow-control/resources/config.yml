# HTTP 服务器限速插件配置

# 此配置文件用于定义 HTTP 服务器的限速策略，允许您根据 IP 地址、用户身份或自定义规则来限制带宽和连接数。

# IP 地址分组大小配置
# 这些设置定义了如何对未登录用户的 IP 地址进行分组，以便共享限速器。
# 当服务器限制未登录用户时，它会根据这些设置将相似的 IP 地址归为一组。
# 同一组内的所有用户将共享同一个限速配额。
# 这样做是为了防止恶意用户通过更换 IP 地址来绕过服务器的限速机制。
#
# 例如，对于 IPv4 地址，如果您将 ipGroupSize 设置为 8，那么所有形如 192.168.1.x 的 IP 地址（即忽略后 8 位）
# 都将被视为同一个组。这意味着这些 IP 地址共享相同的限速配额。
ipGroupSize: 8  # IPv4 地址分组大小。取值范围是 0-32。
  # 设置为 0 意味着每个独立的 IPv4 地址都被视为一个单独的组。
  # 较小的值（例如 0）提供更精细的控制，但可能占用更多资源。
# 较大的值（例如 8）提供更粗略的控制，更适合于限制整个子网。
ipGroupSize6: 64 # IPv6 地址分组大小。取值范围是 0-128。
  # 设置为 0 意味着每个独立的 IPv6 地址都被视为一个单独的组。
# 与 IPv4 类似，该值决定 IPv6 地址分组的粒度。

# 用户组切换规则 (可选)
# `groupRule` 字段允许您定义一段 Java 代码。这段代码会在服务器启动时被编译并执行。
# 它的主要作用是动态地判断每个传入的 HTTP 请求应该应用哪个限速组的规则。
#
# 您可以根据以下参数来编写自定义逻辑：
# - roj.plugin.PermissionHolder user: 当前请求的用户对象。
#     如果用户未登录，则此参数为 `null`。
#     这个对象包含用户 ID、用户名以及用户所属的权限组等信息。
# - roj.http.server.Request `request`: HTTP 请求对象。
#     此对象提供了请求信息，例如请求路径, 请求头, 来源地址等信息。
# 具体方法详见这些类的源代码或javadoc
#
# 您的 Java 代码需要返回一个字符串，该字符串应与下面 `groups` 部分中定义的某个限速组的名称相匹配。
# - 如果返回 `null`，将使用默认的限速规则（基于 IP 地址分组的 `guest` 规则）。
# - 如果代码在用户未登录时返回了非 `null` 的组名，那么该组的限速将**仍然基于请求的 IP 地址**进行限制，而不是基于用户名称。
#   这对于实现某些特殊的访客限速策略可能很有用。
# - 如果用户已登录，且代码返回了某个存在的组名，那么该登录用户将被分配到该组，并对其进行独立的限速。
#
# 注意：要启用下面的示例代码，请将键名从 `groupRule_` 修改为 `groupRule` (去掉下划线)。
# 示例：根据请求路径和用户登录状态来动态选择限速组。
groupRule_: |-
  // 1. 如果请求路径是 "/some/big/file"，我们不希望注册的用户就能随便下载大文件。
  //    此时，返回 `null` 意味着不进行用户组切换
  //    系统将继续使用默认的基于 IP 地址分组的 `guest` 组。
  if (request.path().equals("/some/big/file")) {
    return null;
  }
  // 如果用户已登录，则返回用户的组名；否则返回 null，使用基于IP的默认规则。
  return user == null ? null : user.getGroupName();

# 限速组配置
# 此部分定义了不同用户组或场景下的具体限速规则。
groups:
  # `guest` (访客) 限速组
  # 这是一个特殊且强制存在的组。它的名称 `guest` 是插件内部硬编码的。
  # 当以下任何条件满足时，系统将对请求应用 `guest` 组中定义的限速规则：
  # 1. 发出请求的用户未登录 (即匿名用户)。
  # 2. 用户已登录，但其权限组名称未在 `groups` 配置项中定义。
  # 3. 上方的 `groupRule` 代码执行后返回了 `null`。
  #
  # `guest` 组的限速是基于 IP 地址进行共享的。具体的分组方式由 `ipGroupSize` 和 `ipGroupSize6` 决定。
  guest:
    # 突发流量容量 (Bursting Capacity) - **令牌桶算法的关键参数**
    # 这是一个令牌桶算法的参数，用于允许短时间内的流量突发。
    # 简要说明令牌桶算法原理：
    # 1. **初始容量**: 每个限速器实例在初始化时，都拥有一个等同于 `burst` 大小的“不限速”流量额度。
    # 2. **恢复机制**: 当没有数据传输时，或者数据传输速率低于 `speed` 所设定的速率时，
    #    系统会以 `speed` 定义的速率（减去实际传输速率）来补充“不限速”流量额度，直到达到 `burst` 定义的最大容量。
    # 3. **限速生效**: 一旦“不限速”流量额度被耗尽，任何超出 `speed` 设定的传输速率的流量都将被限制。
    # 支持的单位包括 `B` (字节), `KB` (千字节), `MB` (兆字节), `GB` (千兆字节)。
    burst: 1MB
    # 恒定传输速率 (Rate Limit Speed)
    # 限制所有受当前限速器实例管理的连接的总数据传输速率。
    # 当突发流量耗尽后，数据传输将被限制到此速率。
    # 支持的单位包括 `B/s` (字节/秒)、`KB/s`、`MB/s`、`GB/s`。
    # 也可以使用毫秒 (`ms`)、微秒 (`us`)、纳秒 (`ns`) 作为时间单位，例如 `80KB/ms`。
    speed: 80KB/s

    # 最大并发连接数
    # 指定同一时间可以被服务器处理的最大连接请求数量。
    # 如果同时发起的建立连接请求超过此限制，超出的连接请求会被放入等待队列。
    # 这有助于平滑处理请求高峰，防止服务器瞬时过载。
    maxConcurrentConnections: 16
    # 最大连接数
    # 指定限速器实例可以接受的总连接数量上限。
    # 如果服务器当前活跃的连接总数达到此值，所有新的连接请求都将被拒绝，防止服务器资源耗尽。
    maxConnections: 84

  # `default` (默认) 限速组
  # 这个组的名称 `default` 并非插件硬编码。它通常是与权限管理插件结合使用。
  # 许多权限管理插件会将新注册的用户默认分配到名为 "default" 的用户组。
  #
  # 对于已登录用户，限速是基于“用户-组”对进行独立计算的。
  # 换句话说，每个登录用户在每个不同的限速组中，都拥有一套独立的限速器。
  default:
    burst: 1MB
    speed: 1MB/s

    maxConcurrentConnections: 32
    maxConnections: 68

  # `admin` (管理员) 限速组
  # 假设通过 `groupRule` 返回了 "admin" 字符串，或者某个登录用户的权限组名称就是 "admin"，
  # 那么服务器就会对这些请求或用户应用此组中定义的限速规则。
  admin:
    # 通常情况下，管理员用户不需要进行流量限速，因此 `burst` 和 `speed` 会设置为 0。
    # 流量传输将尽可能快地进行，不受此插件的带宽限制。
    burst: 0
    speed: 0

    # 尽管不限制带宽，但 `maxConcurrentConnections` 和 `maxConnections` 仍然可以被使用。
    # 这允许您即使对管理员不限速，也能够控制他们同时可以建立的连接数量，从而避免资源被过度占用。
    maxConcurrentConnections: 32
    maxConnections: 68